name: Java CI with Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run tests with Maven
      run: mvn clean test

    - name: Extract test results
      id: test-results
      if: always()
      run: |
        # Parse test results from surefire reports
        TOTAL=$(find target/surefire-reports -name "TEST-*.xml" -exec grep -h "tests=" {} \; | sed 's/.*tests="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
        FAILURES=$(find target/surefire-reports -name "TEST-*.xml" -exec grep -h "failures=" {} \; | sed 's/.*failures="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
        ERRORS=$(find target/surefire-reports -name "TEST-*.xml" -exec grep -h "errors=" {} \; | sed 's/.*errors="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
        SKIPPED=$(find target/surefire-reports -name "TEST-*.xml" -exec grep -h "skipped=" {} \; | sed 's/.*skipped="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')

        FAILED=$((FAILURES + ERRORS))
        PASSED=$((TOTAL - FAILED - SKIPPED))

        echo "total=${TOTAL:-0}" >> $GITHUB_OUTPUT
        echo "passed=${PASSED:-0}" >> $GITHUB_OUTPUT
        echo "failed=${FAILED:-0}" >> $GITHUB_OUTPUT
        echo "skipped=${SKIPPED:-0}" >> $GITHUB_OUTPUT

        echo "Test Results: Total=$TOTAL, Passed=$PASSED, Failed=$FAILED, Skipped=$SKIPPED"

    - name: Publish Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Maven Tests
        path: target/surefire-reports/*.xml
        reporter: java-junit
        fail-on-error: false

    - name: Generate Test Summary
      uses: test-summary/action@v2
      if: always()
      with:
        paths: "target/surefire-reports/*.xml"

    - name: Create test results badge
      uses: schneegans/dynamic-badges-action@v1.7.0
      if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      with:
        auth: ${{ secrets.CODE_KATA_GIST_SECRET }}
        gistID: ${{ secrets.CODE_KATA_GIST_ID }}
        filename: test-results.json
        label: tests
        message: ${{ steps.test-results.outputs.passed }} passed | ${{ steps.test-results.outputs.failed }} failed
        color: ${{ steps.test-results.outputs.failed == '0' && 'green' || 'red' }}
