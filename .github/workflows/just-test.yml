name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run tests with coverage
      run: mvn clean test

    - name: Display Coverage Summary
      if: always()
      run: |
        echo "## Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Extract coverage data from jacoco.csv
        if [ -f target/site/jacoco/jacoco.csv ]; then
          echo "| Metric | Missed | Covered | Total | Coverage % |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|---------|-------|------------|" >> $GITHUB_STEP_SUMMARY

          # Parse instruction coverage
          INST_MISSED=$(awk -F',' 'NR>1 {sum+=$4} END {print sum}' target/site/jacoco/jacoco.csv)
          INST_COVERED=$(awk -F',' 'NR>1 {sum+=$5} END {print sum}' target/site/jacoco/jacoco.csv)
          INST_TOTAL=$((INST_MISSED + INST_COVERED))
          INST_PCT=$(awk "BEGIN {printf \"%.2f\", ($INST_COVERED/$INST_TOTAL)*100}")

          # Parse branch coverage
          BRANCH_MISSED=$(awk -F',' 'NR>1 {sum+=$6} END {print sum}' target/site/jacoco/jacoco.csv)
          BRANCH_COVERED=$(awk -F',' 'NR>1 {sum+=$7} END {print sum}' target/site/jacoco/jacoco.csv)
          BRANCH_TOTAL=$((BRANCH_MISSED + BRANCH_COVERED))
          BRANCH_PCT=$(awk "BEGIN {printf \"%.2f\", ($BRANCH_COVERED/$BRANCH_TOTAL)*100}")

          # Parse line coverage
          LINE_MISSED=$(awk -F',' 'NR>1 {sum+=$8} END {print sum}' target/site/jacoco/jacoco.csv)
          LINE_COVERED=$(awk -F',' 'NR>1 {sum+=$9} END {print sum}' target/site/jacoco/jacoco.csv)
          LINE_TOTAL=$((LINE_MISSED + LINE_COVERED))
          LINE_PCT=$(awk "BEGIN {printf \"%.2f\", ($LINE_COVERED/$LINE_TOTAL)*100}")

          echo "| Instructions | $INST_MISSED | $INST_COVERED | $INST_TOTAL | $INST_PCT% |" >> $GITHUB_STEP_SUMMARY
          echo "| Branches | $BRANCH_MISSED | $BRANCH_COVERED | $BRANCH_TOTAL | $BRANCH_PCT% |" >> $GITHUB_STEP_SUMMARY
          echo "| Lines | $LINE_MISSED | $LINE_COVERED | $LINE_TOTAL | $LINE_PCT% |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **Overall Coverage: $INST_PCT%**" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Coverage report not found!" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Publish Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results
        path: target/surefire-reports/*.xml
        reporter: java-junit


    - name: Generate JaCoCo Badge
      uses: cicirello/jacoco-badge-generator@v2
      if: always()
      with:
        jacoco-csv-file: target/site/jacoco/jacoco.csv
        badges-directory: .github/badges
        generate-coverage-badge: true
        generate-branches-badge: true

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: target/site/jacoco/

    - name: Add Coverage PR Comment
      uses: madrapps/jacoco-report@v1.6.1
      if: github.event_name == 'pull_request'
      with:
        paths: target/site/jacoco/jacoco.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 0
        min-coverage-changed-files: 0
